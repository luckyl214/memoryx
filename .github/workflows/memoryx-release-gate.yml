name: MemoryX ReleaseGate

on:
  pull_request:
  push:
    branches:
      - memoryx-2-kernel
      - main

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Collect tests
        run: |
          python -m pytest --collect-only -q \
            --ignore=memoryx-pure-release \
            --ignore=tools \
            --ignore=scripts/test_siliconflow_embedding.py

      - name: Run tests
        run: |
          python -m pytest -q \
            --ignore=memoryx-pure-release \
            --ignore=tools \
            --ignore=scripts/test_siliconflow_embedding.py

      - name: Run MemoryX ReleaseGate
        run: |
          python scripts/run_memoryx_release_gate.py

      - name: Repository guard
        run: |
          python scripts/memoryx_repo_guard.py
